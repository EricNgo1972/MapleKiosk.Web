name: Build (Linux release)

# Manual-only. Builds a linux-x64 release, packages it as a .tar.gz,
# and publishes it as a GitHub Release. No Actions artifacts are uploaded.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  build:
    name: Publish v${{ inputs.version }} (linux-x64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore MapleKiosk.Web.csproj

      - name: Publish (Release, linux-x64)
        run: |
          dotnet publish MapleKiosk.Web.csproj \
            -c Release \
            -r linux-x64 \
            --no-self-contained \
            -p:Version=${{ inputs.version }} \
            -p:AssemblyVersion=${{ inputs.version }}.0 \
            -p:FileVersion=${{ inputs.version }}.0 \
            -o publish

      - name: Package tarball
        id: pkg
        run: |
          NAME="maplekiosk-${{ inputs.version }}-linux-x64.tar.gz"
          tar -C publish -czf "$NAME" .
          echo "file=$NAME" >> "$GITHUB_OUTPUT"
          echo "### MapleKiosk v${{ inputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -lh "$NAME" | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: ${{ steps.pkg.outputs.file }}
